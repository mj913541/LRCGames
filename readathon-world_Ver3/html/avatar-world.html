<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar World</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/avatar-world.css">

</head>

<body>

<header class="aw-header">
  <div class="aw-header-left">
    <button id="btnBack">← Back</button>
  </div>

  <div class="aw-header-center">
    <h1>Avatar World</h1>
  </div>

  <div class="aw-header-right">
    <button id="btnShop">Avatar Shop</button>
  </div>
</header>


<main class="aw-main">

  <!-- ROOM -->
  <section class="aw-room">

    <div id="roomBackground" class="aw-room-bg"></div>

    <div class="aw-room-layer wall" id="wallLayer"></div>

    <div class="aw-room-layer floor" id="floorLayer"></div>

    <div class="aw-room-layer avatar" id="avatarLayer"></div>

    <div class="aw-room-layer pet" id="petLayer"></div>

  </section>


  <!-- INVENTORY -->
  <section class="aw-inventory">

    <div class="aw-tabs">

      <button data-tab="wearables" class="tab active">Wearables</button>
      <button data-tab="pets" class="tab">Pets</button>
      <button data-tab="wall">Wall</button>
      <button data-tab="floor">Floor</button>
      <button data-tab="background">Background</button>

    </div>

    <div id="inventoryGrid" class="aw-grid"></div>

  </section>

</main>

<script type="module" src="../js/avatar-world.js"></script>

</body>
</html>
