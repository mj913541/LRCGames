<section class="school-status-widget">
  <article id="minutesThermometer" class="school-status-card school-status-card--minutes">
    <h3 class="school-status-title">School Minutes</h3>
    <p class="school-status-subtitle">Goal: 200,000 minutes</p>

    <div class="school-status-thermo">
      <div class="school-status-thermo-visual">
        <div class="school-status-thermo-track">
          <div class="school-status-thermo-fill"></div>
        </div>
        <div class="school-status-thermo-bulb"></div>
        <div class="school-status-percent-badge school-status-percent">0%</div>
      </div>

      <div class="school-status-stats">
        <div class="school-status-stat">
          <span class="school-status-stat-label">Current</span>
          <span class="school-status-stat-value school-status-current">0</span>
        </div>
        <div class="school-status-stat">
          <span class="school-status-stat-label">Goal</span>
          <span class="school-status-stat-value school-status-goal">200,000</span>
        </div>
      </div>
    </div>

    <div class="school-status-footer">200,000 to go</div>
  </article>

  <article id="donationsThermometer" class="school-status-card school-status-card--donations">
    <h3 class="school-status-title">School Donations</h3>
    <p class="school-status-subtitle">Goal: $3,000</p>

    <div class="school-status-thermo">
      <div class="school-status-thermo-visual">
        <div class="school-status-thermo-track">
          <div class="school-status-thermo-fill"></div>
        </div>
        <div class="school-status-thermo-bulb"></div>
        <div class="school-status-percent-badge school-status-percent">0%</div>
      </div>

      <div class="school-status-stats">
        <div class="school-status-stat">
          <span class="school-status-stat-label">Current</span>
          <span class="school-status-stat-value school-status-current">$0</span>
        </div>
        <div class="school-status-stat">
          <span class="school-status-stat-label">Goal</span>
          <span class="school-status-stat-value school-status-goal">$3,000</span>
        </div>
      </div>
    </div>

    <div class="school-status-footer">$3,000 to go</div>
  </article>
</section>
