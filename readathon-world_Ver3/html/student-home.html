<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Home • Readathon World</title>

  <link rel="stylesheet" href="../css/student.css" />
  <link rel="stylesheet" href="../css/avatar-world-widget.css" />
</head>

<body class="page page--student-home">
  <div class="bg bg--home" aria-hidden="true"></div>

  <header class="topbar">
    <a class="topbar__back" href="./student-login.html" aria-label="Back to login">
      ← Login
    </a>

    <div class="topbar__title">
      <div class="pill">🧒 Student Home</div>
    </div>

    <button class="topbar__btn" id="btnSignOut" type="button">Sign Out</button>
  </header>

  <main class="wrap">
    <section class="panel panel--hero" id="hdr">
      <div class="heroRow">
        <div>
          <h1 class="h1" data-title>Readathon World</h1>
          <p class="sub" data-subtitle></p>
        </div>
        <a class="btnBig btnBig--primary" href="./student-minutes-submit.html">
          ⏱️ Submit Minutes
        </a>
      </div>

      <div class="gridCards">
        <div class="cardStat">
          <div class="cardStat__label">Minutes Read</div>
          <div class="cardStat__value" id="minutesTotal">—</div>
        </div>
        <div class="cardStat">
          <div class="cardStat__label">Pending Minutes</div>
          <div class="cardStat__value" id="minutesPending">—</div>
        </div>
        <div class="cardStat">
          <div class="cardStat__label">Rubies</div>
          <div class="cardStat__value" id="rubiesBalance">—</div>
          <div class="cardStat__sub" id="rubiesLifetime">—</div>
        </div>
        <div class="cardStat">
          <div class="cardStat__label">Money Raised</div>
          <div class="cardStat__value" id="moneyRaised">—</div>
        </div>
      </div>
    </section>

<section id="avatarWorldMount"></section>

    <section class="isHidden panel">
      <div class="isHidden sectionHead">
        <h2 class="isHidden h2">Quick Links</h2>
      </div>

      <div class="isHidden gridButtons">
        <a class="isHidden btnBig" href="./student-minutes-submit.html">⏱️ Submit Minutes</a>
        <a class="isHidden btnBig" href="./index.html">🏠 Home</a>
      </div>
    </section>

    <div class="loadingOverlay isHidden" id="loadingOverlay" aria-live="polite" aria-busy="true">
      <div class="loadingCard">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loadingText" id="loadingText">Loading…</div>
      </div>
    </div>
    <div class="panel msg msg--error isHidden" id="errorBox" role="alert"></div>
  </main>

  <script type="module" src="../js/student-home.js"></script>
</body>
</html>
