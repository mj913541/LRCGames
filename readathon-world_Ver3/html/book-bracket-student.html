<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Madness</title>

  <link rel="stylesheet" href="../css/book-bracket.css" />
</head>

<body class="bbPage">

  <!-- =========================
       LOADING
  ========================== -->
  <div id="loadingOverlay" class="bbLoadingOverlay isHidden">
    <div class="bbLoadingCard">
      <div class="bbSpinner"></div>
      <p id="loadingText">Loading Book Madness...</p>
    </div>
  </div>

  <!-- =========================
       REQUIRED HEADER (IMPORTANT)
  ========================== -->
  <header style="display:none;">
    <h1 id="pageTitle">Book Madness</h1>
    <p id="pageSubtitle">Listen, vote, and advance!</p>
  </header>

  <main class="bbShell">

    <!-- =========================
         HERO
    ========================== -->
    <section class="bbHero">
      <div>
        <h2 id="bbEventTitle">Book Madness 2026</h2>
        <p id="bbEventSubtitle">Listen and Vote!</p>
      </div>

      <div class="bbHeroChips">
        <div id="bbRoundLabel" class="bbBadge bbBadgeRound">
          Round
        </div>
      </div>
    </section>

    <!-- =========================
         ERROR
    ========================== -->
    <section
      id="bookBracketError"
      class="bbMatchupPanel"
      style="display:none; border:2px solid #d9534f;"
    ></section>

    <!-- =========================
         MATCHUP CARD
    ========================== -->
    <section class="bbMatchupPanel">

      <h3 id="bbMatchupTitle">Matchup</h3>

      <div class="bbMatchupGrid">

        <!-- BOOK A -->
        <div class="bbBookCard">
          <img id="bbBookACover" class="bbBookCover" />

          <h4 id="bbBookATitle"></h4>
          <p id="bbBookAAuthor"></p>

          <button id="bbListenABtn" class="bbBtn bbBtnSecondary">
            ▶ Listen
          </button>

          <button id="bbVoteABtn" class="bbBtn bbBtnPrimary" disabled>
            Vote
          </button>

          <div id="bbBookAStatus" class="bbStatus"></div>
        </div>

        <!-- BOOK B -->
        <div class="bbBookCard">
          <img id="bbBookBCover" class="bbBookCover" />

          <h4 id="bbBookBTitle"></h4>
          <p id="bbBookBAuthor"></p>

          <button id="bbListenBBtn" class="bbBtn bbBtnSecondary">
            ▶ Listen
          </button>

          <button id="bbVoteBBtn" class="bbBtn bbBtnPrimary" disabled>
            Vote
          </button>

          <div id="bbBookBStatus" class="bbStatus"></div>
        </div>

      </div>

      <!-- NAV -->
      <div class="bbNavBar">
        <button id="bbPrevBtn" class="bbBtn bbBtnSecondary">
          ← Previous
        </button>

        <button id="bbNextBtn" class="bbBtn bbBtnSecondary">
          Next →
        </button>
      </div>

    </section>

  </main>

  <!-- =========================
       PLAYER MODAL
  ========================== -->
  <div id="bbPlayerModal" class="bbModal isHidden">
    <div class="bbModalContent">

      <h3 id="bbPlayerModalTitle">Now Playing</h3>
      <p id="bbPlayerModalSubtitle"></p>

      <div id="bookBracketPlayer"></div>

      <div id="bbPlayerStatus"></div>
      <div id="bbPlayerProgressText"></div>

      <button id="bbClosePlayerBtn" class="bbBtn bbBtnSecondary">
        Close
      </button>

    </div>
  </div>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script type="module" src="../js/book-bracket-student.js"></script>

</body>
</html>
