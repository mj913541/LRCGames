<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff Login • Readathon World</title>

  <link rel="stylesheet" href="../css/staff.css" />
</head>

<body class="page page--staff-login">
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="topbar__back" href="./index.html" aria-label="Back to home">
      ← Home
    </a>
    <div class="topbar__title">
      <div class="pill">Staff Login</div>
    </div>
    <div class="topbar__right" aria-hidden="true"></div>
  </header>

  <main class="wrap">
    <section class="panel">
      <h1 class="h1">Welcome, Staff!</h1>
      <p class="sub">Enter your staff userId (example: <strong>staff_peterson</strong>) and your 4-digit PIN.</p>

      <div class="hidden schoolBar" role="group" aria-label="School ID">
        <div class="hidden schoolBar__label">School:</div>
        <div class="hidden schoolBar__value" id="schoolIdLabel"></div>
        <button class="hidden chipBtn" id="btnChangeSchool" type="button">Change</button>
      </div>

      <form class="form" id="loginForm">
        <label class="field">
          <span class="field__label">Staff User ID</span>
          <input
            class="input"
            id="userIdInput"
            autocomplete="username"
            spellcheck="false"
            placeholder="staff_lastname"
          />
        </label>

        <label class="field">
          <span class="field__label">4-digit PIN</span>
          <input
            class="input pin"
            id="pinInput"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="[0-9]*"
            maxlength="4"
            placeholder="••••"
          />
        </label>

        <button class="btnPrimary" type="submit" id="btnLogin">
          Log In
        </button>

        <div class="msg msg--error isHidden" id="errorBox" role="alert"></div>
      </form>

      <div class="helper">
        <button class="btnGhost" id="btnClear" type="button">Clear</button>
      </div>

      <div class="loadingOverlay isHidden" id="loadingOverlay" aria-live="polite" aria-busy="true">
        <div class="loadingCard">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loadingText" id="loadingText">Loading…</div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__chip">Tip: Staff IDs look like <strong>staff_peterson</strong> or <strong>staff_lrc</strong></div>
    </footer>
  </main>

  <dialog class="hidden dialog" id="schoolDialog" aria-labelledby="schoolDialogTitle">
    <form method="dialog" class="dialog__panel">
      <h2 class="h2" id="schoolDialogTitle">Change School ID</h2>
      <p class="sub">Use the default unless you’re testing another school.</p>

      <label class="hidden field">
        <span class="field__label">School ID</span>
        <input class="input" id="schoolIdInput" autocomplete="off" spellcheck="false"
               placeholder="308_longbeach_elementary" />
      </label>

      <div class="hidden row">
        <button class="btnSmall" value="cancel" type="submit">Cancel</button>
        <button class="btnSmall btnSmall--primary" value="ok" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="../js/staff-login.js"></script>
</body>
</html>
