<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Video Library" />
  <title>Video Library</title>
  <link rel="stylesheet" href="../css/video-library.css" />
</head>
<body>
  <!-- Required by shared app.js helpers -->
  <header id="hdr" class="pageHeader">
    <div id="data-title" data-title>Video Library</div>
    <div id="data-subtitle" data-subtitle>Watch videos and earn rubies</div>
  </header>

  <main class="videoLibraryPage">
    <section class="videoLibraryStats">
      <div class="statCard">
        <span class="statLabel">Completed</span>
        <strong id="completedCount">0</strong>
      </div>

      <div class="statCard">
        <span class="statLabel">Rubies Earned</span>
        <strong id="earnedRubies">0</strong>
      </div>

      <div class="statCard">
        <span class="statLabel">Current Video</span>
        <strong id="currentVideoStatus">Not watching</strong>
      </div>
    </section>

    <section class="boardWrap">
      <div class="background-container" id="videoZoneBoard" aria-label="Video library board">
        <button id="zone-01" class="click-zone" type="button" aria-label="Video slot 1"></button>
        <button id="zone-02" class="click-zone" type="button" aria-label="Video slot 2"></button>
        <button id="zone-03" class="click-zone" type="button" aria-label="Video slot 3"></button>
        <button id="zone-04" class="click-zone" type="button" aria-label="Video slot 4"></button>
        <button id="zone-05" class="click-zone" type="button" aria-label="Video slot 5"></button>

        <button id="zone-06" class="click-zone" type="button" aria-label="Video slot 6"></button>
        <button id="zone-07" class="click-zone" type="button" aria-label="Video slot 7"></button>
        <button id="zone-08" class="click-zone" type="button" aria-label="Video slot 8"></button>
        <button id="zone-09" class="click-zone" type="button" aria-label="Video slot 9"></button>
        <button id="zone-10" class="click-zone" type="button" aria-label="Video slot 10"></button>

        <button id="zone-11" class="click-zone" type="button" aria-label="Video slot 11"></button>
        <button id="zone-12" class="click-zone" type="button" aria-label="Video slot 12"></button>
        <button id="zone-13" class="click-zone" type="button" aria-label="Video slot 13"></button>
        <button id="zone-14" class="click-zone" type="button" aria-label="Video slot 14"></button>
        <button id="zone-15" class="click-zone" type="button" aria-label="Video slot 15"></button>

        <button id="zone-16" class="click-zone" type="button" aria-label="Video slot 16"></button>
        <button id="zone-17" class="click-zone" type="button" aria-label="Video slot 17"></button>
        <button id="zone-18" class="click-zone" type="button" aria-label="Video slot 18"></button>
        <button id="zone-19" class="click-zone" type="button" aria-label="Video slot 19"></button>
        <button id="zone-20" class="click-zone" type="button" aria-label="Video slot 20"></button>
      </div>
    </section>
  </main>

  <div id="bbPlayerModal" class="bbModal" style="display:none;">
    <div class="bbModalBackdrop"></div>

    <div
      class="bbModalCard"
      role="dialog"
      aria-modal="true"
      aria-labelledby="bbPlayerModalTitle"
    >
      <div class="bbModalHeader">
        <div>
          <h3 id="bbPlayerModalTitle">Read Aloud</h3>
          <p id="bbPlayerModalSubtitle">Video reward</p>
        </div>

        <button
          id="bbClosePlayerBtn"
          class="bbIconBtn"
          type="button"
          aria-label="Close player"
        >
          ✕
        </button>
      </div>

      <div class="bbPlayerWrap">
        <div id="bookBracketPlayer" class="bbPlayerMount"></div>
      </div>

      <div class="bbPlayerInfo">
        <div id="bbPlayerStatus" class="bbPlayerStatus">Loading player...</div>
        <div id="bbPlayerProgressText" class="bbPlayerProgressText"></div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="../js/video-library.js"></script>
</body>
</html>
