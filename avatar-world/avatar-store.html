<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Avatar Store • Read-a-thon World</title>
  <link rel="stylesheet" href="./avatar-store.css" />
</head>
<body>

  <div class="container">
    <div class="shell vine-border">

      <!-- HEADER -->
      <div class="header">
        <div>
          <div class="badge">🛍️ AVATAR STORE</div>
          <div class="h1">
            <span class="icon">💎</span>
            Spend Your Rubies
          </div>
          <p class="sub">
            Buy cool outfits, jungle gear, pets, and decorations for your avatar!
          </p>
        </div>

        <div class="right">
          <div id="balanceChip" class="rubyPill">
            <span class="ruby">💎</span>
            <span class="amt">0</span>
            <span class="lbl">Rubies</span>
          </div>

          <a class="pillBtn backLink"
             href="../readathon-world/student-home.html">
            ← Back to Jungle Home
          </a>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">

        <div class="section">

          <!-- Filters -->
          <div class="tabs">
            <div class="tabRow">
              <select id="cat" class="pillBtn">
                <option value="all">All</option>
                <option value="background">Backgrounds</option>
                <option value="body">Body</option>
                <option value="outfit">Outfits</option>
                <option value="accessory">Accessories</option>
                <option value="pet">Pets</option>
              </select>

              <input
                id="search"
                class="pillBtn"
                type="text"
                placeholder="Search items..."
              />
            </div>
          </div>

          <!-- Messages -->
          <div id="msg" class="notice" style="margin-top:12px;"></div>

          <!-- Item Grid -->
          <div id="grid" class="scrollGrid" style="margin-top:14px;"></div>

        </div>

      </div>

    </div>
  </div>

  <script type="module" src="./avatar-store.js"></script>
</body>
</html>
