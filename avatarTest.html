<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Avatar Layer Test</title>

<style>

/* ======================================
   AVATAR GRID CONTAINER
====================================== */

.avatar-container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
  background:blueviolet;
}


/* ======================================
   AVATAR SIZE (Scaled Down Preview)
   Real asset size = 640 x 960
   Preview = 160 x 240
====================================== */

.avatar{
  position:relative;
  width:160px;   /* scaled preview */
  height:240px;  /* maintain 2:3 ratio */
}


/* ======================================
   AVATAR LAYERS
====================================== */

.avatar img{
  position:absolute;
  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:contain;
  pointer-events:none;
}


/* ======================================
   LAYER ORDER
====================================== */

.base{
  z-index:1;
}

.head-item{
  z-index:4;
}


/* ======================================
   OPTIONAL DEBUG OUTLINE
   (very useful when aligning items)
====================================== */

.avatar{
  outline:2px dashed rgba(255,255,255,.3);
}

</style>
</head>


<body>

<h2>Avatar Layer Test</h2>

<div class="avatar-container">

<div class="avatar">
<img src="./readathon-world_Ver3/img/avatar-world/base/base-lion.png" class="base">
<img src="./readathon-world_Ver3/img/avatar-world/clothes/dragon-wings.png" class="head-item">
</div>

<div class="avatar">
