<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AAA Admin Home • Readathon World</title>

  <link rel="stylesheet" href="/readathon-world_Ver2/css/admin.css" />
</head>

<body class="page page--admin-home">
  <div class="bg bg--home" aria-hidden="true"></div>

  <header class="topbar">
    <a class="topbar__back" href="/readathon-world_Ver2/html/admin-login.html" aria-label="Back to login">
      ← Login
    </a>

    <div class="topbar__title">
      <div class="pill">🛠️ Admin Home</div>
    </div>

    <button class="topbar__btn" id="btnSignOut" type="button">Sign Out</button>
  </header>

  <main class="wrap">
    <section class="panel panel--hero" id="hdr">
      <div class="heroRow">
        <div>
          <h1 class="h1" data-title>Readathon World</h1>
          <p class="sub" data-subtitle></p>
        </div>
        <a class="btnBig btnBig--primary" href="/readathon-world_Ver2/html/admin-minutes-approve.html">
          ✅ Approve Pending Minutes
        </a>
      </div>

      <div class="gridButtons">
        <a class="btnBig" href="/readathon-world_Ver2/html/staff-minutes-submit.html">🎁 Submit / Award (Admin)</a>
        <a class="btnBig" href="/readathon-world_Ver2/html/admin-minutes-approve.html">✅ Approve Pending</a>
      </div>
    </section>

    <section class="panel">
      <div class="sectionHead">
        <h2 class="h2">Admin Tools</h2>
        <p class="sub">Coming next: search any user, view inventory, edit balances, group awards.</p>
      </div>

      <div class="gridButtons">
        <a class="btnBig" href="/readathon-world_Ver2/html/index.html">🏠 Home</a>
      </div>
    </section>

    <div class="loadingOverlay isHidden" id="loadingOverlay" aria-live="polite" aria-busy="true">
      <div class="loadingCard">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loadingText" id="loadingText">Loading…</div>
      </div>
    </div>

    <div class="panel msg msg--error isHidden" id="errorBox" role="alert"></div>
  </main>

  <script type="module" src="/readathon-world_Ver2/js/admin-home.js"></script>
</body>
</html>
