<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alphabet Quest</title>
  <link rel="stylesheet" href="../css/alphabet-quest.css" />
</head>
<body>
  <!-- Required by shared app.js helpers -->
  <div id="dataTitle" data-title="Alphabet Quest" hidden></div>
  <div id="dataSubtitle" data-subtitle="Practice letters and earn rubies" hidden></div>

  <main class="aq-page">
    <section class="aq-shell">
      <header class="aq-header">
        <div>
          <p class="aq-kicker">Skill Game</p>
          <h1>Alphabet Quest</h1>
          <p class="aq-subtitle">
            Practice letter names, sounds, and upper/lowercase matching.
          </p>
        </div>

        <div class="aq-status-card">
          <div class="aq-status-row"><span>Mode</span><strong id="modeLabel">Basic Quest</strong></div>
          <div class="aq-status-row"><span>Question</span><strong id="roundLabel">1 / 8</strong></div>
          <div class="aq-status-row"><span>Score</span><strong id="scoreLabel">0</strong></div>
          <div class="aq-status-row"><span>Today’s Paid Wins</span><strong id="dailyWinsLabel">0</strong></div>
        </div>
      </header>

      <section class="aq-top-actions">
        <button id="practiceBtn" class="aq-mode-btn" type="button">Practice</button>
        <button id="basicBtn" class="aq-mode-btn is-active" type="button">Basic Quest</button>
        <button id="challengeBtn" class="aq-mode-btn" type="button">Challenge</button>
      </section>

      <section class="aq-game-card">
        <div class="aq-progress-wrap">
          <div class="aq-progress-bar">
            <div id="progressFill" class="aq-progress-fill"></div>
          </div>
        </div>

        <div id="promptBadge" class="aq-prompt-badge">Match</div>

        <div class="aq-question-area">
          <h2 id="questionText" class="aq-question-text">Loading...</h2>
          <p id="questionHint" class="aq-question-hint"></p>
        </div>

        <div id="choiceGrid" class="aq-choice-grid"></div>
        <div id="feedbackBox" class="aq-feedback-box" aria-live="polite"></div>
      </section>

      <section id="endCard" class="aq-modal is-hidden">
<div id="endCard" class="aq-modal is-hidden">
  <div class="aq-modal-card">
    <h2 id="endTitle"></h2>
    <p id="endSummary"></p>
    <button id="playAgainBtn" type="button">Play Again</button>
  </div>
</div>
      </section>
    </section>
  </main>

  <script type="module" src="../js/alphabet-quest.js"></script>
</body>
</html>
