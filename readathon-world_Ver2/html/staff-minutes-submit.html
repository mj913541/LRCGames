<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Staff • Submit Minutes</title>

    <link rel="stylesheet" href="/readathon-world_Ver2/css/staff.css" />
  </head>

  <body class="page page--staff">
    <header class="topbar">
      <div id="hdr" class="hdr"></div>
      <button id="btnSignOut" class="btn btn--ghost" type="button">Sign out</button>
    </header>

    <main class="wrap">
      <!-- ✅ NEW: Quick Class Submit -->
      <section class="panel quickSubmit">
        <h2 class="panel__title">Quick Class Submit</h2>
        <p class="muted">
          Pick a grade and homeroom, then check who is present. Enter minutes once and submit to
          selected students.
        </p>

        <div class="stack">
          <div>
            <div class="label">1) Pick Grade</div>
            <div id="gradeButtons" class="chipRow"></div>
          </div>

          <div>
            <div class="label">2) Pick Homeroom</div>
            <div id="homeroomButtons" class="chipRow"></div>
          </div>

          <div class="rosterTop">
            <div id="rosterMeta" class="muted">Pick a grade to load rosters.</div>
            <div class="rosterBtns">
              <button id="btnSelectAll" type="button" class="btn btn--small">Select all</button>
              <button id="btnClearAll" type="button" class="btn btn--small btn--ghost">
                Clear all
              </button>
            </div>
          </div>

          <div id="rosterList" class="rosterList"></div>

          <div class="grid2">
            <div>
              <label class="label" for="quickMinutesInput">Minutes (applies to selected)</label>
              <input id="quickMinutesInput" type="number" min="0" step="1" value="0" />
            </div>
            <div>
              <label class="label" for="quickNoteInput">Note (optional)</label>
              <input id="quickNoteInput" type="text" placeholder="e.g., LRC specials block" />
            </div>
          </div>

          <button id="btnQuickSubmit" class="btn btn--primary" type="button">
            Submit minutes to selected ✅
          </button>

          <div id="quickErrorBox" class="msg msg--error isHidden"></div>
          <div id="quickOkBox" class="msg msg--ok isHidden"></div>
        </div>
      </section>

      <!-- Existing: Individual Submit/Award -->
      <section class="panel">
        <h2 class="panel__title">Manual Submit / Award (Individual)</h2>

        <form id="awardForm" class="stack">
          <div class="grid2">
            <div>
              <label class="label" for="targetUserIdInput">Target userId</label>
              <input id="targetUserIdInput" type="text" placeholder="student_123" />
            </div>

            <div>
              <label class="label" for="actionTypeSelect">Action</label>
              <select id="actionTypeSelect">
                <option value="MINUTES_SUBMIT_PENDING">Submit Minutes (Pending)</option>
                <option value="RUBIES_AWARD">Award Rubies</option>
                <option value="RUBIES_SPEND">Spend Rubies</option>
                <option value="MONEY_RAISED_ADD">Add Money Raised</option>
              </select>
            </div>
          </div>

          <div class="grid3">
            <div>
              <label class="label" for="minutesInput">Minutes</label>
              <input id="minutesInput" type="number" min="0" step="1" value="0" />
            </div>
            <div>
              <label class="label" for="rubiesInput">Rubies</label>
              <input id="rubiesInput" type="number" step="1" value="0" />
            </div>
            <div>
              <label class="label" for="moneyDollarsInput">Money ($)</label>
              <input id="moneyDollarsInput" type="text" value="0.00" />
            </div>
          </div>

          <div>
            <label class="label" for="noteInput">Note (optional)</label>
            <input id="noteInput" type="text" />
          </div>

          <button id="btnSubmit" class="btn btn--primary" type="submit">Submit</button>

          <div id="errorBox" class="msg msg--error isHidden"></div>
          <div id="okBox" class="msg msg--ok isHidden"></div>
        </form>
      </section>

      <!-- Existing: Homeroom award -->
      <section class="panel">
        <h2 class="panel__title">Award Homeroom</h2>

        <form id="homeroomForm" class="stack">
          <div class="grid2">
            <div>
              <label class="label" for="homeroomIdInput">Homeroom ID</label>
              <input id="homeroomIdInput" type="text" placeholder="hr_peterson" />
            </div>
            <div>
              <label class="label" for="hrMinutesInput">Minutes</label>
              <input id="hrMinutesInput" type="number" min="0" step="1" value="0" />
            </div>
          </div>

          <div class="grid2">
            <div>
              <label class="label" for="hrRubiesInput">Rubies</label>
              <input id="hrRubiesInput" type="number" min="0" step="1" value="0" />
            </div>
            <div>
              <label class="label" for="hrNoteInput">Note (optional)</label>
              <input id="hrNoteInput" type="text" />
            </div>
          </div>

          <button id="btnHomeroomSubmit" class="btn btn--primary" type="submit">
            Submit homeroom award ✅
          </button>

          <div id="hrErrorBox" class="msg msg--error isHidden"></div>
          <div id="hrOkBox" class="msg msg--ok isHidden"></div>
        </form>
      </section>
    </main>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading isHidden" aria-hidden="true">
      <div class="loading__card">
        <div class="spinner" aria-hidden="true"></div>
        <div id="loadingText">Loading…</div>
      </div>
    </div>

    <script type="module" src="/readathon-world_Ver2/js/staff-minutes-submit.js"></script>
  </body>
</html>
