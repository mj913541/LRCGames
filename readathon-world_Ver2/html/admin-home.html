<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Home • Readathon World</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/leaderboard.css" />
  <link rel="stylesheet" href="../css/avatar-world-widget.css" />
</head>

<body class="page page--admin-home">
  <div class="bg bg--home" aria-hidden="true"></div>

  <header class="topbar">
    <a class="topbar__back" href="./admin-login.html" aria-label="Back to login">← Login</a>
    <div class="topbar__title"><div class="pill">Admin Home</div></div>
    <button class="topbar__btn" id="btnSignOut" type="button">Sign Out</button>
  </header>

  <main class="wrap" id="pageWrap">
    <section class="panel panel--hero" id="hdr">
      <div class="heroRow">
        <div>
          <h1 class="h1" data-title>Readathon World</h1>
          <p class="sub" data-subtitle></p>
        </div>
      </div>

      <div class="gridButtons">
        <div class="hero-actions">
          <a href="../../skill-games/baseline-multiple-choice.html"
             class="btn-action btn-submit-minutes btn-action--large">
            Submit Minutes
          </a>
          <a href="./admin-assign.html"
              class="btn-action btn-admin-assign btn-action--large">
              Admin Assign
          </a>
         <a href="../../skill-games/index.html"
              class="btn-action btn-admin-assign btn-action--large">
              Skill Games
          </a>
          <a href="./video-library.html"
             class="btn-action btn-store btn-action--large">
            book madness
          </a>

          <a href="./prize-store.html"
             class="btn-action btn-store btn-action--large">
            Prize Store
          </a>

          <a href="./donations.html"
             class="btn-action btn-donate btn-action--large">
            Donate
          </a>

          <a href="./admin-minutes-approve.html"
             class="btn-action btn-approve-minutes btn-action--large">
            Approve Minutes
          </a>
        </div>
      </div>

      <div class="gridCards">
        <div class="cardStat">
          <div class="cardStat__label">Your Minutes</div>
          <div class="cardStat__value" id="minutesTotal">—</div>
        </div>

        <div class="cardStat">
          <div class="cardStat__label">Your Pending</div>
          <div class="cardStat__value" id="minutesPending">—</div>
        </div>

        <div class="cardStat">
          <div class="cardStat__label">Your Rubies</div>
          <div class="cardStat__value" id="rubiesBalance">—</div>
          <div class="cardStat__sub" id="rubiesLifetime">—</div>
        </div>

        <div class="cardStat">
          <div class="cardStat__label">Your Money</div>
          <div class="cardStat__value" id="moneyRaised">—</div>
        </div>
      </div>
    </section>

<section id="leaderboardMount"></section>
<section id="avatarWorldMount"></section>
<section id="prizeAdminMount"></section>

    <!-- Permissions panel (kept as-is, currently hidden in your build) -->
    <div class="loadingOverlay isHidden" id="loadingOverlay" aria-live="polite" aria-busy="true">
      <div class="loadingCard">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loadingText" id="loadingText">Loading…</div>
      </div>
    </div>

    <div class="panel msg msg--error isHidden" id="errorBox" role="alert"></div>
  </main>

  <script type="module" src="../js/admin-home.js"></script>
</body>
</html>
