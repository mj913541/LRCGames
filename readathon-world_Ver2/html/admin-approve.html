<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Approve Minutes • Admin • Readathon World</title>

  <link rel="stylesheet" href="/readathon-world_Ver2/css/admin.css" />
</head>

<body class="page page--admin-approve">
  <div class="bg bg--home" aria-hidden="true"></div>

  <header class="topbar">
    <a class="topbar__back" href="/readathon-world_Ver2/html/admin-home.html" aria-label="Back to admin home">
      ← Home
    </a>

    <div class="topbar__title">
      <div class="pill">✅ Approve Minutes</div>
    </div>

    <button class="topbar__btn" id="btnSignOut" type="button">Sign Out</button>
  </header>

  <main class="wrap">
    <section class="panel" id="hdr">
      <h1 class="h1" data-title>Pending Minutes</h1>
      <p class="sub" data-subtitle></p>

      <div class="approveBar">
        <button class="btnBig btnBig--primary" id="btnRefresh" type="button">🔄 Refresh</button>
        <div class="approveBar__meta" id="countLabel">Loading…</div>
      </div>

      <div class="filterRow">
        <label class="field field--inline">
          <span class="field__label">Show</span>
          <select class="input input--small" id="limitSelect">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </label>

        <label class="field field--inline">
          <span class="field__label">Search userId</span>
          <input class="input input--small" id="searchInput" placeholder="student_10293" />
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="sectionHead">
        <h2 class="h2">Requests</h2>
        <p class="sub">Approving moves minutes from <strong>Pending</strong> → <strong>Total</strong> and awards <strong>Rubies 1:1</strong>.</p>
      </div>

      <div class="list" id="pendingList" aria-label="Pending minutes list"></div>

      <div class="emptyNote isHidden" id="emptyNote">
        🎉 No pending minutes right now!
      </div>
    </section>

    <div class="loadingOverlay isHidden" id="loadingOverlay" aria-live="polite" aria-busy="true">
      <div class="loadingCard">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loadingText" id="loadingText">Loading…</div>
      </div>
    </div>

    <div class="panel msg msg--error isHidden" id="errorBox" role="alert"></div>
    <div class="panel msg msg--ok isHidden" id="okBox" role="status"></div>
  </main>

  <script type="module" src="/readathon-world_Ver2/js/admin-minutes-approve.js"></script>
</body>
</html>
