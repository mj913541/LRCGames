<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Planner</title>

  <!-- CSS files -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/theme.css" />
</head>

<body>

  <!-- Main App Container -->
  <main class="app">

    <!-- Setup Screen -->
<section class="setup-screen">
  <!-- Title -->
  <h1 class="setup-title">🌸 Daily Setup 🌸</h1>

  <!-- Small intro text -->
  <p class="setup-subtitle">
    Good morning!
  </p>

  <!-- Grid of setup cards -->
  <div class="setup-grid">

    <!-- Card 1: Today's Date -->
    <div class="card">
      <p class="card-question">What is today’s date?</p>

      <div class="card-actions">
        <button class="card-btn">April 10, 2026</button>
      </div>
    </div>

    <!-- Card 2: Daycare today -->
    <div class="card">
      <p class="card-question">Is today a daycare day?</p>

      <div class="card-actions">
        <button class="card-btn">Yes</button>
        <button class="card-btn">No</button>
      </div>
    </div>

    <!-- Card 3: Rotation day -->
    <div class="card card-wide">
      <p class="card-question">What rotation day is today?</p>

      <div class="card-actions card-actions-wrap">
        <button class="card-btn">A</button>
        <button class="card-btn">B</button>
        <button class="card-btn">C</button>
        <button class="card-btn">D</button>
        <button class="card-btn">E</button>
        <button class="card-btn">No School</button>
      </div>
    </div>

    <!-- Card 4: Tomorrow daycare -->
    <div class="card">
      <p class="card-question">Is tomorrow a daycare day?</p>

      <div class="card-actions">
        <button class="card-btn">Yes</button>
        <button class="card-btn">No</button>
      </div>
    </div>

    <!-- Card 5: Tomorrow school -->
    <div class="card">
      <p class="card-question">Is tomorrow a school day?</p>

      <div class="card-actions">
        <button class="card-btn">Yes</button>
        <button class="card-btn">No</button>
      </div>
    </div>

  </div>
</section>

  </main>

  <!-- JS (we’ll use later) -->
  <script src="js/app.js"></script>

</body>
</html>
