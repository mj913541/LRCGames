<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baseline Multiple Choice</title>
    <link rel="stylesheet" href="./skill-games.css" />
    <link rel="stylesheet" href="./baseline-multiple-choice.css" />
</head>
<body>
  <!-- Required by shared app.js helpers -->
  <div id="dataTitle" data-title="Multiple Choice" hidden></div>
  <div id="dataSubtitle" data-subtitle="Multiple Choice" hidden></div>

  <main class="page">
    <section class="shell">
      <header class="header">
        <div>
          <p class="kicker">Skill Game</p>
          <h1>Alphabet Quest</h1>
          <p class="subtitle">
            Practice letter names, sounds, and upper/lowercase matching.
          </p>
        </div>

        <div class="status-card">
          <div class="status-row"><span>Mode</span><strong id="modeLabel">Basic Quest</strong></div>
          <div class="status-row"><span>Question</span><strong id="roundLabel">1 / 8</strong></div>
          <div class="status-row"><span>Score</span><strong id="scoreLabel">0</strong></div>
          <div class="status-row"><span>Today’s Paid Wins</span><strong id="dailyWinsLabel">0</strong></div>
        </div>
      </header>

      <section class="top-actions">
        <button id="practiceBtn" class="mode-btn" type="button">Practice</button>
        <button id="basicBtn" class="mode-btn is-active" type="button">Basic Quest</button>
        <button id="challengeBtn" class="mode-btn" type="button">Challenge</button>
      </section>

      <section class="game-card">
        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div id="promptBadge" class="mc-prompt-badge">Match</div>

        <div class="mc-question-area">
          <h2 id="questionText" class="mc-question-text">Loading...</h2>
          <p id="questionHint" class="mc-question-hint"></p>
        </div>

        <div id="choiceGrid" class="mc-choice-grid"></div>
        <div id="feedbackBox" class="mc-feedback-box" aria-live="polite"></div>
      </section>
      
      <div id="endCard" class="modal is-hidden">
    <div class="modal-card">
      <h2 id="endTitle"></h2>
      <p id="endSummary"></p>
      <button id="playAgainBtn" type="button">Play Again</button>
    </div>
      </div>
    </section>
  </main>
  
  <script type="module" src="./alphabet-quest.js"></script>
</body>
</html>
