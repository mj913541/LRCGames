<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Home • Read-a-thon World</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* ==============================
       Jungle Room Styling
    =============================== */

    .room {
      position: relative;
      height: 340px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(#c9f0d6, #8fd3a8);
      border: 3px solid rgba(0,0,0,0.12);
      margin-top: 14px;
    }

    .room-wall {
      position: absolute;
      inset: 0 0 42% 0;
      background: linear-gradient(#dff7ea, #b7e4cc);
      z-index: 0;
    }

    .room-floor {
      position: absolute;
      bottom: 0;
      height: 42%;
      width: 100%;
      background: linear-gradient(#7fbf7f, #5aa05a);
      z-index: 0;
    }

    #roomLayers {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .room-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .room-layer.bg { z-index: 1; object-fit: cover; }
    .room-layer.decor { z-index: 2; }
    .room-layer.body { z-index: 3; }
    .room-layer.outfit { z-index: 4; }
    .room-layer.accessory { z-index: 5; }
    .room-layer.pet { z-index: 6; }

    .room-title-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .stat-strong {
      font-size: 22px;
    }
  </style>
</head>

<body>
  <div class="bg-canopy"></div>

  <header class="topbar">
    <a class="brand" href="index.html" style="text-decoration:none; color:inherit;">
      <div class="brand-mark">🦁</div>
      <div class="brand-text">
        <div class="brand-title">Read-a-thon World</div>
        <div class="brand-subtitle">My Jungle Home</div>
      </div>
    </a>

    <div style="display:flex; gap:10px; align-items:center;">
      <a class="btn btn-primary" href="submit.html">📚 Submit Minutes</a>
      <button id="signOutBtn" class="btn btn-ghost">Sign out</button>
    </div>
  </header>

  <main class="container">

    <!-- Welcome -->
    <section class="card">
      <h1 style="margin:0;">Welcome, <span id="studentName">Reader</span>!</h1>
      <p class="muted" style="margin:6px 0 0;">
        Approved minutes earn Reading Rubies 💎
      </p>
    </section>

    <!-- Stats -->
    <section class="card">
      <div class="room-title-row">
        <h2 style="margin:0;">📊 My Reading Progress</h2>
        <a class="btn btn-secondary" href="submit.html">+ Add Minutes</a>
      </div>

      <div class="choices" style="grid-template-columns: repeat(3, 1fr); margin-top:12px;">
        <div class="choice">
          <div class="choice-emoji">✅</div>
          <div class="choice-label">
            Approved Minutes<br />
            <strong class="stat-strong" id="approvedMinutes">—</strong>
          </div>
        </div>

        <div class="choice">
          <div class="choice-emoji">⏳</div>
          <div class="choice-label">
            Pending Minutes<br />
            <strong class="stat-strong" id="pendingMinutes">0</strong>
          </div>
        </div>

        <div class="choice">
          <div class="choice-emoji">💎</div>
          <div class="choice-label">
            Reading Rubies<br />
            <strong class="stat-strong" id="rubies">—</strong>
            <div style="margin-top:8px;">
              <a class="btn btn-secondary"
                 href="../avatar-world/avatar-store.html">
                🛍️ Spend Rubies
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Jungle Room -->
    <section class="card">
      <div class="room-title-row">
        <h2 style="margin:0;">🌿 My Jungle Room</h2>
        <span class="pill">Your avatar updates automatically!</span>
      </div>

      <div class="room">
        <div class="room-wall"></div>
        <div class="room-floor"></div>

        <!-- Dynamic Avatar Layers -->
        <div id="roomLayers"></div>
      </div>
    </section>

  </main>

  <script type="module" src="js/student-home.js"></script>
</body>
</html>
